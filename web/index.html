<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Taksi buyurtma</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #222222);
      --hint: var(--tg-theme-hint-color, #888888);
      --link: var(--tg-theme-link-color, #2678b6);
      --btn: var(--tg-theme-button-color, #2678b6);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    .header {
      text-align: center;
      padding: 20px 0 24px;
    }
    .header .icon { font-size: 48px; }
    .header h1 { font-size: 22px; font-weight: 700; margin-top: 8px; }
    .header p { font-size: 14px; color: var(--hint); margin-top: 4px; }

    .card {
      background: var(--secondary-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--hint);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .card input {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text);
      padding: 0;
    }
    .card input::placeholder { color: var(--hint); }

    .divider {
      height: 1px;
      background: var(--btn);
      opacity: 0.15;
      margin: 10px 0;
    }

    .route-card {
      background: var(--secondary-bg);
      border-radius: 16px;
      padding: 0;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .route-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 12px;
    }
    .route-row + .route-row { border-top: 1px solid rgba(128,128,128,0.15); }
    .route-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-from { background: #34c759; }
    .dot-to   { background: #ff3b30; }
    .route-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text);
    }
    .route-row input::placeholder { color: var(--hint); }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--btn);
      color: var(--btn-text);
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: #ff3b30;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }

    /* === SUCCESS SCREEN === */
    #successSection {
      display: none;
      text-align: center;
      padding: 40px 16px;
    }
    .success-icon { font-size: 72px; }
    .success-title {
      font-size: 24px;
      font-weight: 700;
      margin: 16px 0 8px;
      color: var(--text);
    }
    .success-sub {
      font-size: 16px;
      color: var(--hint);
      line-height: 1.5;
    }
    .success-info {
      background: var(--secondary-bg);
      border-radius: 16px;
      padding: 16px;
      margin: 24px 0;
      text-align: left;
    }
    .success-info .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 15px;
    }
    .success-info .row + .row { border-top: 1px solid rgba(128,128,128,0.15); }
    .success-info .row .lbl { color: var(--hint); font-size: 13px; }
    .success-info .row .val { font-weight: 600; }
    .close-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #34c759;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- FORMA -->
<div id="formSection">
  <div class="header">
    <div class="icon">🚕</div>
    <h1>Taksi buyurtma</h1>
    <p>Qayerga borishingizni kiriting</p>
  </div>

  <form id="rideForm" novalidate>
    <div class="route-card">
      <div class="route-row">
        <span class="route-dot dot-from"></span>
        <input name="from" type="text" placeholder="Qayerdan (manzil yoki shahar)" required autocomplete="off" />
      </div>
      <div class="route-row">
        <span class="route-dot dot-to"></span>
        <input name="to" type="text" placeholder="Qayerga (manzil yoki shahar)" required autocomplete="off" />
      </div>
    </div>

    <div class="card">
      <label>Telefon raqam</label>
      <input name="phone" type="tel" placeholder="+998 90 000 00 00" required autocomplete="tel" />
    </div>

    <input type="hidden" name="userId" id="userId" />
    <input type="hidden" name="username" id="username" />

    <button type="submit" class="submit-btn">🔍 Taksi qidirish</button>
    <p class="error-msg" id="errorMsg"></p>
  </form>
</div>

<!-- MUVAFFAQIYAT -->
<div id="successSection">
  <div class="success-icon">✅</div>
  <div class="success-title">Qabul qilindi!</div>
  <div class="success-sub">Taksichlar siz bilan tez orada bog'lanadi</div>

  <div class="success-info">
    <div class="row">
      <span class="lbl">Qayerdan</span>
      <span class="val" id="s-from"></span>
    </div>
    <div class="row">
      <span class="lbl">Qayerga</span>
      <span class="val" id="s-to"></span>
    </div>
    <div class="row">
      <span class="lbl">Telefon</span>
      <span class="val" id="s-phone"></span>
    </div>
  </div>

  <button class="close-btn" id="closeBtn">Yopish</button>
</div>

<script src="app.js"></script>
</body>
</html>
